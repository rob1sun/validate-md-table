<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <title>BV / Metadata – validering</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* CSS förkortad men design bibehållen */
    :root{--bg:#f5f5f7;--card-bg:#ffffff;--border:#e5e7eb;--border-strong:#94a3b8;--text:#111827;--muted:#6b7280;--accent:#2563eb;--ok:#15803d;--ok-bg:#dcfce7;--warn:#b91c1c;--warn-bg:#fee2e2;--unsaved-bg:#fef08a;--chip-bg:#f3f4f6;--chip-border:#d1d5db}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:radial-gradient(circle at top,#eef2ff 0,#f5f5f7 45%,#f5f5f7 100%);color:var(--text)}.page{max-width:1400px;margin:0 auto;padding:1.5rem 1rem 2rem}.page-header{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.6rem}.header-top-row{display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}h1{margin:0;font-size:1.3rem}.header-actions{display:flex;flex-wrap:wrap;align-items:center;gap:.4rem}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;border:1px solid var(--chip-border);font-size:.8rem;padding:.25rem .75rem;cursor:pointer;background:#f9fafb;color:var(--text);white-space:nowrap}.btn-primary{background:var(--accent);color:#ffffff;border-color:var(--accent)}.btn-primary:hover{background:#1d4ed8}.btn-ghost{background:transparent}.btn-small{font-size:.75rem;padding:.15rem .55rem}.btn-ok{background:var(--ok-bg);color:var(--ok);border-color:#bbf7d0}.btn-warn{background:var(--warn-bg);color:var(--warn);border-color:#fecaca}.btn:disabled{opacity:.6;cursor:default}.card{background:var(--card-bg);border-radius:1rem;border:1px solid rgba(15,23,42,.06);box-shadow:0 12px 30px rgba(15,23,42,.06);padding:.8rem .8rem .9rem}.filter-row{display:flex;flex-wrap:wrap;align-items:center;gap:.6rem;margin-bottom:.6rem;position:sticky;top:0;z-index:10;background:var(--card-bg);padding-bottom:.4rem;border-bottom:1px solid var(--border)}.filter-group{display:flex;flex-direction:column;gap:.2rem;font-size:.76rem}.filter-label{color:var(--muted);font-weight:600}input[type="text"],select{font-size:.8rem;padding:.25rem .4rem;border-radius:.5rem;border:1px solid var(--border)}.table-wrapper{border-radius:.75rem;border:1px solid var(--border);overflow-x:auto;background:#ffffff}table{width:100%;border-collapse:collapse;font-size:.8rem;table-layout:fixed}thead{background:#f9fafb}th,td{padding:.35rem .4rem;border-bottom:1px solid #e5e7eb;vertical-align:middle;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}th{font-weight:600;color:#4b5563;font-size:.78rem}tbody tr:hover td{background:#f9fafb}.badge{display:inline-flex;align-items:center;justify-content:center;padding:.05rem .4rem;border-radius:999px;font-size:.7rem;font-weight:500}.badge-ok{background:var(--ok-bg);color:var(--ok);border:1px solid #bbf7d0}.badge-warn{background:var(--warn-bg);color:var(--warn);border:1px solid #fecaca}.badge-neutral{background:#e5e7eb;color:#374151;border:1px solid #d1d5db}.unsaved-row td { background-color: var(--unsaved-bg) !important; }.mismatch-cell{color:#b91c1c;background:#fef2f2;font-weight:500}.status-text{font-size:.75rem;color:var(--muted)}.save-bar{background:#eef2ff;border:1px solid #c7d2fe;padding:0.5rem 1rem;border-radius:0.5rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem;display:none;}
  </style>
</head>
<body>
<div class="page">
  <header class="page-header">
    <div class="header-top-row">
      <h1>BV / Metadata – validering</h1>
      <div class="header-actions">
        <button id="syncBtn" class="btn btn-primary" type="button">Läs in metadata</button>
        <button id="exportCsvBtn" class="btn" type="button">Exportera CSV (Aktuell Batch)</button>
        <a href="/valideringsregler/" class="btn btn-ghost" type="button">Valideringsregler</a>
      </div>
    </div>
  </header>

  <section class="card">
    <div class="filter-row">
      <div class="filter-group">
        <div class="filter-label">Välj Batch</div>
        <select id="batchSelect">
          <option value="1">Laddar batchar...</option>
        </select>
      </div>

      <div class="filter-group">
        <div class="filter-label">Sök i batch</div>
        <input type="text" id="searchInput" placeholder="Sök..." />
      </div>

      <div class="filter-group">
        <div class="filter-label">Match-filter</div>
        <select id="matchFilter">
          <option value="ALL">Alla</option>
          <option value="OK">OK</option>
          <option value="KOLLA">KOLLA</option>
        </select>
      </div>

      <div class="filter-group" style="margin-left:auto;">
        <div class="filter-label">Status</div>
        <span id="rowCounter" style="font-size:0.75rem;">Visar 0 poster</span>
      </div>
    </div>

    <div id="saveBar" class="save-bar">
      <span style="font-size:0.85rem;font-weight:600;color:#1e40af;">Du har osparade ändringar i denna batch!</span>
      <button id="saveBatchBtn" class="btn btn-primary">Spara Batch till databasen</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
        <tr>
          <th style="width:100px;">Orgnr</th>
          <th style="width:200px;">BV: Namn</th>
          <th style="width:200px;">Entity: OrgName</th>
          <th style="width:200px;">Entity: OrgDispName</th>
          <th style="width:90px;">Form & SNI</th>
          <th style="width:70px;">Match</th>
          <th style="width:180px;text-align:right;">Beslut</th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div style="margin-top:0.5rem; display:flex; justify-content:space-between;">
      <div id="syncStatus" class="status-text"></div>
      <div id="tableStatus" class="status-text"></div>
    </div>
  </section>
</div>

<script>
  (function () {
    const API_BASE = "/api";

    const batchSelect = document.getElementById("batchSelect");
    const searchInput = document.getElementById("searchInput");
    const matchFilter = document.getElementById("matchFilter");
    const tableBody = document.getElementById("tableBody");
    const rowCounter = document.getElementById("rowCounter");
    const syncBtn = document.getElementById("syncBtn");
    const saveBar = document.getElementById("saveBar");
    const saveBatchBtn = document.getElementById("saveBatchBtn");
    
    let currentRows = [];
    let unsavedChanges = {}; // Håller koll på { orgnr: "Godkänd" | "Nekad" | "RESET" }
    let currentBatchId = 1;

    // ----- UI & RENDER ----- //

    function updateSaveBar() {
      if (Object.keys(unsavedChanges).length > 0) {
        saveBar.style.display = "flex";
      } else {
        saveBar.style.display = "none";
      }
    }

    function applyFilters() {
      const search = (searchInput.value || "").toLowerCase();
      const matchVal = matchFilter.value;

      return currentRows.filter((row) => {
        if (search) {
          const haystack = (row.orgnr + " " + row.bvName + " " + row.entityOrgName).toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        if (matchVal !== "ALL" && row.match !== matchVal) return false;
        return true;
      });
    }

    function getDecisionForRender(row) {
      // Returnerar antingen det osparade valet, eller det från databasen
      if (unsavedChanges[row.orgnr] !== undefined) {
        const local = unsavedChanges[row.orgnr];
        return local === "RESET" ? null : local;
      }
      return row.decision;
    }

    function renderDecisionCell(row, decision) {
      if (decision === "Godkänd") {
        return `<span style="margin-right:0.4rem;font-weight:600;color:var(--ok);">Godkänd</span>
                <button class="btn btn-small" data-action="reset" data-orgnr="${row.orgnr}">Ångra</button>`;
      }
      if (decision === "Nekad") {
        return `<span style="margin-right:0.4rem;font-weight:600;color:var(--warn);">Nekad</span>
                <button class="btn btn-small" data-action="reset" data-orgnr="${row.orgnr}">Ångra</button>`;
      }
      return `<button class="btn btn-small btn-ok" data-action="approve" data-orgnr="${row.orgnr}">Godkänn</button>
              <button class="btn btn-small btn-warn" data-action="reject" data-orgnr="${row.orgnr}">Neka</button>`;
    }

    function renderTable() {
      const filtered = applyFilters();
      rowCounter.textContent = `Visar ${filtered.length} av ${currentRows.length} i Batch ${currentBatchId}`;
      
      let html = "";
      for (const row of filtered) {
        const decision = getDecisionForRender(row);
        const isUnsaved = unsavedChanges[row.orgnr] !== undefined;
        const trClass = isUnsaved ? "unsaved-row" : "";
        
        const matchBadge = row.match === "OK" ? '<span class="badge badge-ok">OK</span>' : '<span class="badge badge-warn">KOLLA</span>';
        const decisionHtml = renderDecisionCell(row, decision);
        
        const orgNameClass = (!row.matchDetails?.orgNameOk && row.match === "KOLLA") ? 'class="mismatch-cell"' : "";
        const dispNameClass = (!row.matchDetails?.orgDispOk && row.match === "KOLLA") ? 'class="mismatch-cell"' : "";
        
        const sniStr = (row.sniCodes || []).join(", ");
        const formStr = row.formKod ? `[${row.formKod}]` : "";
        const verksamhetHtml = `<div style="font-size:0.7rem; color:#666;" title="${sniStr}">${formStr} ${sniStr.substring(0, 15)}...</div>`;

        html += `<tr class="${trClass}">
          <td>${row.orgnr}</td>
          <td title="${row.bvName}">${row.bvName}</td>
          <td ${orgNameClass} title="${row.entityOrgName}">${row.entityOrgName}</td>
          <td ${dispNameClass} title="${row.entityOrgDispName}">${row.entityOrgDispName}</td>
          <td>${verksamhetHtml}</td>
          <td>${matchBadge}</td>
          <td style="text-align:right;">${decisionHtml}</td>
        </tr>`;
      }
      tableBody.innerHTML = html;
      updateSaveBar();
    }

    // ----- API ANROP ----- //

    async function fetchTable(batchId) {
      document.getElementById("tableStatus").textContent = "Laddar data...";
      try {
        const res = await fetch(`${API_BASE}/table?batch=${batchId}`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        
        currentRows = data.rows || [];
        currentBatchId = data.currentBatch || batchId;
        unsavedChanges = {}; // Nollställ ändringar när vi byter vy
        
        // Uppdatera Batch-dropdown
        const total = data.totalBatches || 1;
        if (batchSelect.options.length === 1 && batchSelect.options[0].value === "1") {
          batchSelect.innerHTML = "";
          for(let i=1; i<=total; i++) {
            batchSelect.innerHTML += `<option value="${i}">Batch ${i}</option>`;
          }
        }
        batchSelect.value = currentBatchId;

        document.getElementById("tableStatus").textContent = `Laddade Batch ${currentBatchId}`;
        renderTable();
      } catch (e) {
        document.getElementById("tableStatus").textContent = "Kunde inte ladda data.";
      }
    }

    async function saveBatch() {
      if(Object.keys(unsavedChanges).length === 0) return;
      saveBatchBtn.disabled = true;
      saveBatchBtn.textContent = "Sparar...";

      try {
        const res = await fetch(`${API_BASE}/save-batch`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ batchId: currentBatchId, updates: unsavedChanges })
        });
        if(!res.ok) throw new Error("Failed to save");
        
        // Vid OK, hämta om batchen så vi får rätt decidedAt från databasen
        await fetchTable(currentBatchId);
      } catch (e) {
        alert("Gick inte att spara. Försök igen!");
      } finally {
        saveBatchBtn.disabled = false;
        saveBatchBtn.textContent = "Spara Batch till databasen";
      }
    }

    async function runSyncMetadata() {
      if (!confirm("Börja synka metadata? Detta kan ta en liten stund.")) return;
      syncBtn.disabled = true;
      document.getElementById("syncStatus").textContent = "Synkar batchar...";
      try {
        const res = await fetch(`${API_BASE}/sync-metadata`, { method: "POST" });
        await res.json();
        document.getElementById("syncStatus").textContent = "Synk klar!";
        fetchTable(currentBatchId);
      } catch (e) {
        document.getElementById("syncStatus").textContent = "Synk misslyckades.";
      } finally {
        syncBtn.disabled = false;
      }
    }

    // ----- EVENTS ----- //

    batchSelect.addEventListener("change", (e) => {
      if (Object.keys(unsavedChanges).length > 0) {
        if(!confirm("Du har osparade ändringar. Vill du byta batch ändå (ändringarna försvinner)?")) {
          e.target.value = currentBatchId; // Gå tillbaka
          return;
        }
      }
      fetchTable(e.target.value);
    });

    searchInput.addEventListener("input", renderTable);
    matchFilter.addEventListener("change", renderTable);
    syncBtn.addEventListener("click", runSyncMetadata);
    saveBatchBtn.addEventListener("click", saveBatch);

    tableBody.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      const action = btn.getAttribute("data-action");
      const orgnr = btn.getAttribute("data-orgnr");

      if (action === "approve") unsavedChanges[orgnr] = "Godkänd";
      else if (action === "reject") unsavedChanges[orgnr] = "Nekad";
      else if (action === "reset") unsavedChanges[orgnr] = "RESET";
      
      renderTable();
    });

    // INIT
    fetchTable(1);
  })();
</script>
</body>
</html>
